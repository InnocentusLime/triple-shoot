<body>
    <canvas id="app_canvas" tabindex='1'></canvas>    
    </div>
    <script type="module">
        import { initSync } from "./trishoot.js";
        fetch("./trishoot_bg.wasm")
            .then((response) => {
                if (!response.ok) {
                    throw new Error(`failed to fetch game WASM: ${response.status} (${response.statusText})`);
                }
                return response.arrayBuffer()
            })
            .then((bytes) => initSync({module: bytes}))
            .catch((error) => {
                console.error(`game failed to start: ${error}`);
            });
    </script>
</body>
